name: CI → Deploy → Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline complet : push sur main → CI verte → déploiement automatique
# Tu n'as rien à faire : git push et c'est réglé.
#
# Ordre forcé : typecheck + lint + test (parallèle) → build → deploy
# Si n'importe quelle étape échoue, le déploiement ne part pas.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Ignorer les migrations Prisma"
        required: false
        default: "false"
        type: boolean
      skip_ci:
        description: "Sauter la CI (urgence uniquement)"
        required: false
        default: "false"
        type: boolean

# Un seul pipeline à la fois — annule le précédent si en cours
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Vérification TypeScript
  # ────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────
  # 2. Lint ESLint
  # ────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run lint

  # ────────────────────────────────────────────────────────────────────────
  # 3. Tests unitaires (Vitest)
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm test
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NODE_ENV: test

  # ────────────────────────────────────────────────────────────────────────
  # 4. Build de vérification
  # ────────────────────────────────────────────────────────────────────────
  # 4. Déploiement (seulement si CI verte)
  # Le build Next.js tourne sur le serveur Hostinger qui a accès à la DB.
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: ${{ always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    environment: production

    steps:
      # ──────────────────────────────────────────────────────────────────────
      # Connexion SSH et déploiement
      # ──────────────────────────────────────────────────────────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: ${{ secrets.HOSTINGER_SSH_PORT || 22 }}
          script_stop: true
          # Timeout 10 min (build peut prendre du temps)
          command_timeout: 10m
          script: |
            set -euo pipefail
            echo "══════════════════════════════════════════"
            echo "  Déploiement — Le Surnaturel de Dieu"
            echo "  $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "══════════════════════════════════════════"

            # ── Aller dans le répertoire du projet ─────────────────────────
            cd ${{ secrets.PROJECT_PATH }}

            # ── Récupérer la dernière version ──────────────────────────────
            echo ""
            echo "▶ 1/6 Pull GitHub…"
            git pull origin main --ff-only
            echo "  ✓ Code à jour : $(git log -1 --pretty='%h %s')"

            # ── Installer les dépendances ──────────────────────────────────
            echo ""
            echo "▶ 2/6 Installation dépendances…"
            npm ci --omit=dev --legacy-peer-deps
            echo "  ✓ npm ci terminé"

            # ── Générer le client Prisma ───────────────────────────────────
            echo ""
            echo "▶ 3/6 Prisma generate…"
            npx prisma generate
            echo "  ✓ Prisma client généré"

            # ── Migrations base de données ─────────────────────────────────
            echo ""
            if [[ "${{ inputs.skip_migrations }}" == "true" ]]; then
              echo "▶ 4/6 Migrations — IGNORÉES (skip_migrations=true)"
            else
              echo "▶ 4/6 Migrations base de données…"
              npx prisma migrate deploy
              echo "  ✓ Migrations appliquées"
            fi

            # ── Build Next.js ──────────────────────────────────────────────
            echo ""
            echo "▶ 5/6 Build Next.js…"
            NODE_ENV=production npm run build
            echo "  ✓ Build terminé"

            # ── Redémarrage PM2 ───────────────────────────────────────────
            echo ""
            echo "▶ 6/6 Redémarrage PM2…"
            if pm2 list | grep -q "surnaturel"; then
              pm2 reload ecosystem.config.js --env production
            else
              pm2 start ecosystem.config.js --env production
            fi
            pm2 save
            echo "  ✓ PM2 opérationnel"

            # ── Résumé ────────────────────────────────────────────────────
            echo ""
            echo "══════════════════════════════════════════"
            echo "  ✅ Déploiement terminé avec succès"
            echo "══════════════════════════════════════════"
            pm2 list

      # ──────────────────────────────────────────────────────────────────────
      # 2. Vérification santé post-déploiement
      # ──────────────────────────────────────────────────────────────────────
      - name: Health check
        run: |
          SITE_URL="${{ secrets.NEXTAUTH_URL }}"
          echo "Health check sur ${SITE_URL}…"

          # Attendre que l'app soit prête (max 60s)
          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}" || echo "000")
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              echo "✓ Site opérationnel — HTTP ${STATUS}"
              exit 0
            fi
            echo "  Tentative ${i}/12 — HTTP ${STATUS} — attente 5s…"
            sleep 5
          done

          echo "✗ Health check échoué après 60s"
          exit 1

      # ──────────────────────────────────────────────────────────────────────
      # 3. Notification en cas d'échec (optionnel — via email GitHub)
      # ──────────────────────────────────────────────────────────────────────
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Déploiement échoué — voir les logs ci-dessus"
          echo "Vérifiez : pm2 logs surnaturel (sur le serveur Hostinger)"
