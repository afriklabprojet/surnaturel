name: CI → Deploy → Hostinger

# ─────────────────────────────────────────────────────────────────────────────
# Pipeline complet : push sur main → CI verte → déploiement automatique
# Tu n'as rien à faire : git push et c'est réglé.
#
# Ordre forcé : typecheck + lint + test (parallèle) → build → deploy
# Si n'importe quelle étape échoue, le déploiement ne part pas.
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      skip_migrations:
        description: "Ignorer les migrations Prisma"
        required: false
        default: "false"
        type: boolean
      skip_ci:
        description: "Sauter la CI (urgence uniquement)"
        required: false
        default: "false"
        type: boolean

# Un seul pipeline à la fois — annule le précédent si en cours
concurrency:
  group: deploy-production
  cancel-in-progress: true

env:
  NODE_VERSION: "20"

jobs:
  # ────────────────────────────────────────────────────────────────────────
  # 1. Vérification TypeScript
  # ────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────
  # 2. Lint ESLint
  # ────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm run lint

  # ────────────────────────────────────────────────────────────────────────
  # 3. Tests unitaires (Vitest)
  # ────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_ci != 'true' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - run: npm test
        env:
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: http://localhost:3000
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          NODE_ENV: test

  # ────────────────────────────────────────────────────────────────────────
  # 4. Build de vérification
  # ────────────────────────────────────────────────────────────────────────
  # 4. Build Next.js (tourne sur le runner GitHub, pas sur le serveur)
  # Le serveur Hostinger manque de ressources pour npm run build.
  # Stratégie : build ici → rsync .next/standalone/ → PM2 reload.
  # ────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Hostinger
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test]
    if: ${{ always() && (needs.typecheck.result == 'success' || needs.typecheck.result == 'skipped') && (needs.lint.result == 'success' || needs.lint.result == 'skipped') && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # ──────────────────────────────────────────────────────────────────────
      # 1. Dépendances + migrations + build (sur le runner GitHub)
      # ──────────────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run DB migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Build Next.js (standalone)
        run: npm run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}

      # ──────────────────────────────────────────────────────────────────────
      # 2. Préparer SSH + rsync les artefacts vers le serveur
      # ──────────────────────────────────────────────────────────────────────
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTINGER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p 65002 "${{ secrets.HOSTINGER_SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload standalone artifacts
        run: |
          SSH="ssh -i ~/.ssh/id_deploy -p 65002 -o StrictHostKeyChecking=no"
          DEST="${{ secrets.HOSTINGER_SSH_USER }}@${{ secrets.HOSTINGER_SSH_HOST }}"

          echo "▶ 1/4 standalone/…"
          rsync -az --delete -e "$SSH" .next/standalone/       "$DEST":~/surnaturel/.next/standalone/

          echo "▶ 2/4 static/…"
          rsync -az --delete -e "$SSH" .next/static/           "$DEST":~/surnaturel/.next/standalone/.next/static/

          echo "▶ 3/4 public/…"
          rsync -az --delete -e "$SSH" public/                 "$DEST":~/surnaturel/.next/standalone/public/

          echo "▶ 4/4 ecosystem.config.js…"
          rsync -az -e "$SSH" ecosystem.config.js              "$DEST":~/surnaturel/ecosystem.config.js

          echo "✓ Artefacts uploadés"

      # ──────────────────────────────────────────────────────────────────────
      # 3. Recharger PM2 via SSH (aucun build côté serveur)
      # ──────────────────────────────────────────────────────────────────────
      - name: Reload PM2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 65002
          script_stop: true
          command_timeout: 2m
          script: |
            set -euo pipefail
            export PATH="/opt/alt/alt-nodejs20/root/usr/bin:/home/u507379921/.npm-global/bin:$PATH"
            cd ~/surnaturel
            echo "Commit déployé : $(git log -1 --pretty='%h %s' 2>/dev/null || echo 'N/A')"
            if pm2 list | grep -q "surnaturel"; then
              pm2 reload ecosystem.config.js --env production
            else
              pm2 start ecosystem.config.js --env production
            fi
            pm2 save
            pm2 list

      # ──────────────────────────────────────────────────────────────────────
      # 4. Vérification santé post-déploiement
      # ──────────────────────────────────────────────────────────────────────
      - name: Health check
        run: |
          SITE_URL="${{ secrets.NEXTAUTH_URL }}"
          echo "Health check sur ${SITE_URL}…"

          for i in {1..12}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${SITE_URL}" || echo "000")
            if [[ "$STATUS" == "200" || "$STATUS" == "301" || "$STATUS" == "302" ]]; then
              echo "✓ Site opérationnel — HTTP ${STATUS}"
              exit 0
            fi
            echo "  Tentative ${i}/12 — HTTP ${STATUS} — attente 5s…"
            sleep 5
          done

          echo "✗ Health check échoué après 60s"
          exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Déploiement échoué — voir les logs ci-dessus"
          echo "Vérifiez : pm2 logs surnaturel (sur le serveur Hostinger)"
